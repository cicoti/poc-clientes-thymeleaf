<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="auth-card auth-card-sm">
    <h1 class="auth-title">Login</h1>

    <div th:if="${mensagemErro}" class="alert-box alert-box-error" th:text="${mensagemErro}"></div>
    <div th:if="${mensagemSucesso}" class="alert-box alert-box-success" th:text="${mensagemSucesso}"></div>

    <div class="alert-box alert-box-info">
        Caso ainda não tenha acesso, faça seu cadastro.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="auth-form-group">
            <label for="username" class="form-label">Usuário</label>
            <input type="text" id="username" name="username" class="form-control" autocomplete="username">
        </div>

        <div class="auth-form-group">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" name="password" class="form-control" autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="auth-link-area">
        <a th:href="@{/cadastro}">Cadastrar novo usuário</a>
    </div>
</div>
</body>
</html>
