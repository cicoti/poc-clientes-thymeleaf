<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            width: 360px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        .grupo {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            background: #1f6feb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
        }

        .erro {
            background: #ffe5e5;
            color: #a30000;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .sucesso {
            background: #e7f7e7;
            color: #1d6b1d;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .info {
            background: #eef4ff;
            color: #1f4f99;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }

        .link-area {
            margin-top: 16px;
            text-align: center;
        }

        .link-area a {
            color: #1f6feb;
            text-decoration: none;
            font-weight: bold;
        }

        .link-area a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>

    <div th:if="${mensagemErro}" class="erro" th:text="${mensagemErro}"></div>
    <div th:if="${mensagemSucesso}" class="sucesso" th:text="${mensagemSucesso}"></div>

    <div class="info">
        Caso ainda não tenha acesso, faça seu cadastro.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="grupo">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" autocomplete="username">
        </div>

        <div class="grupo">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" autocomplete="current-password">
        </div>

        <button type="submit">Entrar</button>
    </form>

    <div class="link-area">
        <a th:href="@{/cadastro}">Cadastrar novo usuário</a>
    </div>
</div>
</body>
</html>
