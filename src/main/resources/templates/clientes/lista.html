<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
    <aside th:replace="~{fragments/sidebar :: menu('clientes')}"></aside>

    <main class="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="mb-0">Clientes</h2>
                    <small class="text-muted">Lista de clientes cadastrados</small>
                </div>
                <a th:href="@{/clientes/novo}" class="btn btn-primary">Novo Cliente</a>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Telefone</th>
                                    <th class="text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cliente : ${clientes}">
                                    <td th:text="${cliente.codigoCliente}">CL000001</td>
                                    <td th:text="${cliente.nome}">Nome</td>
                                    <td th:text="${cliente.email}">email@email.com</td>
                                    <td th:text="${cliente.telefone}">(11) 99999-9999</td>
                                    <td class="text-end">
                                        <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                                        <a th:href="@{/clientes/excluir/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('Deseja realmente excluir este cliente?')">Excluir</a>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(clientes)}">
                                    <td colspan="5" class="text-center text-muted py-4">
                                        Nenhum cliente cadastrado.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
