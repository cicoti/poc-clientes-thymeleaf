<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
	<aside th:replace="~{fragments/sidebar :: menu('clientes')}"></aside>
    <main class="content">
        <div class="container-fluid">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h2 class="mb-0">Clientes</h2>
                            <small class="text-muted">Cadastro e manutenção de clientes</small>
                        </div>
                        <a th:href="@{/clientes/novo}" class="btn btn-primary">Novo Cliente</a>
                    </div>
                </div>

                <div class="card-body">
                    <div th:if="${#lists.isEmpty(clientes)}" class="alert alert-secondary mb-0">
                        Nenhum cliente cadastrado.
                    </div>

                    <div th:if="${!#lists.isEmpty(clientes)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th class="text-end">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cliente : ${clientes}">
                                <td th:text="${cliente.id}"></td>
                                <td th:text="${cliente.nome}"></td>
                                <td th:text="${cliente.email}"></td>
                                <td th:text="${cliente.telefone}"></td>
                                <td class="text-end">
                                    <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-secondary">
                                        Editar
                                    </a>
                                    <a th:href="@{/clientes/excluir/{id}(id=${cliente.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Deseja realmente excluir este cliente?');">
                                        Excluir
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
