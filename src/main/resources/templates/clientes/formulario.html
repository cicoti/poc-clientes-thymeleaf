<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
    <aside th:replace="~{fragments/sidebar :: menu('clientes')}"></aside>

    <main class="content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white border-0 py-3">
                            <div>
                                <h2 class="mb-0">Cadastro de Cliente</h2>
                                <small class="text-muted">Preencha os dados do cliente e do endereço</small>
                            </div>
                        </div>

                        <div class="card-body">
                            <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
                                <input type="hidden" th:field="*{id}">
                                <input type="hidden" th:field="*{codigoCliente}">
                                <input type="hidden" th:field="*{endereco.id}">
                                <input type="hidden" th:field="*{endereco.codigo}">

                                <div class="mb-3" th:if="*{codigoCliente != null and !#strings.isEmpty(codigoCliente)}">
                                    <label class="form-label">Código do Cliente</label>
                                    <input type="text" th:value="*{codigoCliente}" class="form-control" readonly>
                                </div>

                                <div class="mb-3"
                                     th:if="${cliente.endereco != null and cliente.endereco.codigo != null and !#strings.isEmpty(cliente.endereco.codigo)}">
                                    <label class="form-label">Código do Endereço</label>
                                    <input type="text" th:value="${cliente.endereco.codigo}" class="form-control" readonly>
                                </div>

                                <div class="mb-3">
                                    <label for="nome" class="form-label">Nome</label>
                                    <input type="text" id="nome" th:field="*{nome}" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" th:field="*{email}" class="form-control">
                                </div>

                                <div class="mb-4">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="text" id="telefone" th:field="*{telefone}" class="form-control">
                                </div>

                                <hr class="my-4">

                                <div class="mb-3">
                                    <h4 class="mb-1">Endereço</h4>
                                    <small class="text-muted">Preencha os dados do endereço do cliente</small>
                                </div>

                                <div class="mb-3">
                                    <label for="logradouro" class="form-label">Logradouro</label>
                                    <input type="text" id="logradouro" th:field="*{endereco.logradouro}" class="form-control" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="numero" class="form-label">Número</label>
                                        <input type="text" id="numero" th:field="*{endereco.numero}" class="form-control" required>
                                    </div>

                                    <div class="col-md-8 mb-3">
                                        <label for="complemento" class="form-label">Complemento</label>
                                        <input type="text" id="complemento" th:field="*{endereco.complemento}" class="form-control">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="bairro" class="form-label">Bairro</label>
                                    <input type="text" id="bairro" th:field="*{endereco.bairro}" class="form-control" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="cep" class="form-label">CEP</label>
                                        <input type="text" id="cep" th:field="*{endereco.cep}" class="form-control" required>
                                    </div>

                                    <div class="col-md-5 mb-3">
                                        <label for="cidade" class="form-label">Cidade</label>
                                        <input type="text" id="cidade" th:field="*{endereco.cidade}" class="form-control" required>
                                    </div>

                                    <div class="col-md-3 mb-4">
                                        <label for="estado" class="form-label">Estado</label>
                                        <input type="text" id="estado" th:field="*{endereco.estado}" class="form-control" maxlength="2" required>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Voltar</a>
                                    <button type="submit" class="btn btn-primary">Salvar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
