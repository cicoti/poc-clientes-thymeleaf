<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
	<aside th:replace="~{fragments/sidebar :: menu('clientes')}"></aside>
    <main class="content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white border-0 py-3">
                            <div>
                                <h2 class="mb-0">Cadastro de Cliente</h2>
                                <small class="text-muted">Preencha os dados do cliente</small>
                            </div>
                        </div>

                        <div class="card-body">
                            <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
                                <input type="hidden" th:field="*{id}">

                                <div class="mb-3">
                                    <label for="nome" class="form-label">Nome</label>
                                    <input type="text" id="nome" th:field="*{nome}" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" th:field="*{email}" class="form-control">
                                </div>

                                <div class="mb-4">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="text" id="telefone" th:field="*{telefone}" class="form-control">
                                </div>

                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Voltar</a>
                                    <button type="submit" class="btn btn-primary">Salvar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
