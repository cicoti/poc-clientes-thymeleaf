<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">

<div class="auth-card">
    <h1 class="auth-title">Cadastro de usuário</h1>
    <p class="auth-subtitle">Preencha os dados para criar seu acesso</p>

    <div th:if="${mensagemErro}" class="alert-box alert-box-error" th:text="${mensagemErro}"></div>

    <form th:action="@{/cadastro}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="auth-form-group">
            <label for="username" class="form-label">Usuário</label>
            <input type="text" id="username" th:field="*{username}" class="form-control" autocomplete="username">
        </div>

        <div class="auth-form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" autocomplete="email">
        </div>

        <div class="auth-form-group">
            <label for="password" class="form-label">Senha</label>
            <div class="password-field">
                <input type="password" id="password" th:field="*{password}" class="form-control" autocomplete="new-password">
                <button type="button" class="btn btn-outline-secondary btn-toggle-password" onclick="alternarSenha('password', this)">Mostrar</button>
            </div>
        </div>

        <div class="auth-form-group">
            <label for="confirmacaoPassword" class="form-label">Confirmar senha</label>
            <div class="password-field">
                <input type="password" id="confirmacaoPassword" th:field="*{confirmacaoPassword}" class="form-control" autocomplete="new-password">
                <button type="button" class="btn btn-outline-secondary btn-toggle-password" onclick="alternarSenha('confirmacaoPassword', this)">Mostrar</button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
    </form>

    <div class="auth-link-area">
        <a th:href="@{/login}">Voltar para o login</a>
    </div>
</div>

<script>
    function alternarSenha(idCampo, botao) {
        const campo = document.getElementById(idCampo);

        if (campo.type === "password") {
            campo.type = "text";
            botao.textContent = "Ocultar";
        } else {
            campo.type = "password";
            botao.textContent = "Mostrar";
        }
    }
</script>

</body>
</html>
