<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de usuário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }

        .grupo {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .campo-senha {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .campo-senha input {
            flex: 1;
        }

        .toggle-senha {
            width: auto;
            min-width: 80px;
            padding: 10px 12px;
            border: 1px solid #cfd6dd;
            background: #f1f3f5;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
        }

        .toggle-senha:hover {
            background: #e9ecef;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border: 0;
            background: #198754;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
        }

        .erro {
            background: #ffe5e5;
            color: #a30000;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .link-area {
            margin-top: 16px;
            text-align: center;
        }

        .link-area a {
            color: #1f6feb;
            text-decoration: none;
            font-weight: bold;
        }

        .link-area a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Cadastro de usuário</h1>
    <p>Preencha os dados para criar seu acesso</p>

    <div th:if="${mensagemErro}" class="erro" th:text="${mensagemErro}"></div>

    <form th:action="@{/cadastro}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="grupo">
            <label for="username">Usuário</label>
            <input type="text" id="username" th:field="*{username}" autocomplete="username">
        </div>

        <div class="grupo">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" autocomplete="email">
        </div>

        <div class="grupo">
            <label for="password">Senha</label>
            <div class="campo-senha">
                <input type="password" id="password" th:field="*{password}" autocomplete="new-password">
                <button type="button" class="toggle-senha" onclick="alternarSenha('password', this)">Mostrar</button>
            </div>
        </div>

        <div class="grupo">
            <label for="confirmacaoPassword">Confirmar senha</label>
            <div class="campo-senha">
                <input type="password" id="confirmacaoPassword" th:field="*{confirmacaoPassword}" autocomplete="new-password">
                <button type="button" class="toggle-senha" onclick="alternarSenha('confirmacaoPassword', this)">Mostrar</button>
            </div>
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>
    </form>

    <div class="link-area">
        <a th:href="@{/login}">Voltar para o login</a>
    </div>
</div>

<script>
    function alternarSenha(idCampo, botao) {
        const campo = document.getElementById(idCampo);

        if (campo.type === "password") {
            campo.type = "text";
            botao.textContent = "Ocultar";
        } else {
            campo.type = "password";
            botao.textContent = "Mostrar";
        }
    }
</script>
</body>
</html>
