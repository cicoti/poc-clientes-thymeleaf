<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
    <aside th:replace="~{fragments/sidebar :: menu('inicio')}"></aside>

    <main class="content">
        <div class="container-fluid">
            <div class="page-header">
                <div>
                    <h1 class="mb-1">Menu principal</h1>
                    <div class="page-user">
                        Usuário logado:
                        <strong th:text="${username}">usuario</strong>
                    </div>
                </div>

                <div class="page-actions">
                    <a th:href="@{/clientes}" class="btn btn-primary">Clientes</a>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <p class="mb-2">Esta é a nova área protegida da aplicação.</p>
                    <p class="text-muted mb-0">Aqui você pode mover o conteúdo da antiga index.html.</p>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
