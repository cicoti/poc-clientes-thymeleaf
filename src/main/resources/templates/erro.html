<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Erro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="d-flex">
    <aside th:replace="~{fragments/sidebar :: menu('clientes')}"></aside>

    <main class="content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 mt-4">
                        <div class="card-header bg-white border-0 py-3">
                            <h2 class="mb-0">Ops, ocorreu um problema</h2>
                        </div>

                        <div class="card-body">
                            <div class="alert alert-danger mb-4" role="alert" th:text="${mensagemErro}">
                                Ocorreu um erro ao processar a solicitação.
                            </div>

                            <div class="d-flex justify-content-end">
                                <a th:href="@{/}" class="btn btn-primary">Voltar para o início</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
