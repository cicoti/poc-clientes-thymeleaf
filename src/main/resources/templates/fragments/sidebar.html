<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="sidebar" th:fragment="menu(paginaAtiva)">
    <div class="brand">
        <a th:href="@{/}" class="text-white text-decoration-none">POC Clientes</a>
    </div>

    <nav class="nav flex-column mt-3">
        <a th:href="@{/}"
           th:classappend="${paginaAtiva == 'inicio'} ? ' active' : ''"
           class="nav-link">
            INÍCIO
        </a>

        <a th:href="@{/clientes}"
           th:classappend="${paginaAtiva == 'clientes'} ? ' active' : ''"
           class="nav-link">
            CLIENTES
        </a>
    </nav>

    <div class="mt-4">
        <form th:action="@{/logout}" method="post" class="sidebar-logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="nav-link btn btn-link w-100 text-start">
                SAIR
            </button>
        </form>
    </div>
</aside>

</body>
</html>
